name: Docs CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose examples
        run: |
          cp compose/panel.env.example compose/panel.env
          docker compose -f compose/panel.example.yml config >/dev/null
          docker compose -f compose/node.example.yml config >/dev/null

      - name: Check links and whitespace
        run: |
          test -f docs/architecture.md
          test -f docs/isolated-validation.md
          test -f docs/production-migration.md
          ! grep -RInE '[[:blank:]]+$' --include='*.md' --include='*.yml' --include='*.example' .

      - name: Reject infrastructure addresses and fingerprints
        run: |
          ! grep -RInE '([0-9]{1,3}\.){3}[0-9]{1,3}' README.md docs
          if grep -RInE '[[:xdigit:]]{64}' README.md docs | grep -v 'ghcr.io/'; then
            exit 1
          fi
